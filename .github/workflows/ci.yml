name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fastify_auth_test
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_USER: fastify_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fastify_auth -d fastify_auth_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://fastify_auth:ci-postgres-password@localhost:5432/fastify_auth_test?schema=public
      REDIS_URL: redis://localhost:6379/1
      TEST_DATABASE_URL: postgresql://fastify_auth:ci-postgres-password@localhost:5432/fastify_auth_test?schema=public
      TEST_REDIS_URL: redis://localhost:6379/1
      JWT_ACCESS_SECRET: ci-access-secret-that-is-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-that-is-at-least-32-characters
      JWT_ISSUER: fastify-auth-service-ci
      JWT_ACCESS_AUDIENCE: fastify-auth-service-ci:access
      JWT_REFRESH_AUDIENCE: fastify-auth-service-ci:refresh
      CORS_ORIGINS: http://localhost:3000
      TRUST_PROXY: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
